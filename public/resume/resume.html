    /* ========== CSS变量 ========== */
    :root {
      --primary-color: #333;
      --secondary-color: #666;
      --accent-color: #666700;
      --border-color: #ddd;
      --bg-light: #f8f9fa;
      --bg-dark: #232f3e;

      --font-size-name: 20px;
      --font-size-section: 13px;
      --font-size-title: 11px;
      --font-size-normal: 10px;
      --font-size-small: 9px;
      --font-size-tiny: 8px;

      --spacing-section: 14px;
      --spacing-item: 3px;

    /* ========== 基础样式 ========== */
    @page {
      size: A4;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: var(--primary-color);
      background-color: #f9f9f9;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

      width: 210mm;
      min-height: 297mm;
      max-height: 297mm;
      margin: 0 auto;
      background-color: white;
      padding: 15mm;
      box-sizing: border-box;
      overflow: hidden;
    }

    .resume-container + .resume-container {
      margin-top: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: var(--spacing-section);

    .profile-img {
      width: 100px;
      height: 140px;
      margin-right: 20px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-text h1 {
      font-size: var(--font-size-name);
      margin: 0 0 4px 0;
    }

    .header-title {
      font-size: var(--font-size-title);
      color: var(--secondary-color);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .key-points {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .key-point {
      font-size: var(--font-size-tiny);
      padding: 2px 8px;
      background: var(--bg-dark);
      color: white;
      border-radius: 10px;
      font-weight: 500;
    }

    .header-text p {
      margin: 3px 0;
      line-height: 1.3;
      font-size: var(--font-size-small);
    }

    /* ========== Page 1: 主体布局（左右分栏） ========== */
    .main-content {
      display: flex;
      margin-top: 10px;
    }

    .left-column {
      width: 30%;
      padding-right: 15px;
    }

    .left-column > div + div {
      margin-top: 14px;
    }

    .right-column {
      width: 70%;
      border-left: 1px solid var(--border-color);
      padding-left: 15px;
    }

    .right-column > div + div {
      margin-top: 14px;
    }

    /* ========== 通用组件: Section Title ========== */
    .section-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: var(--spacing-section);
      margin-bottom: var(--spacing-item);
      padding: 3px 0 3px 8px;
      border-left: 3px solid var(--bg-dark);
      border-bottom: none;
      color: var(--bg-dark);
    }

    .section-title:first-child {
      margin-top: 0;
    }

    /* ========== 联系方式 ========== */
    .contact-item {
      display: flex;
      align-items: center;
      margin-bottom: 3px;
      font-size: var(--font-size-normal);
    }

    .contact-icon {
      width: 15px;
      margin-right: 8px;
      text-align: center;
    }

    /* ========== 技能条 ========== */
    .skill-item {
      margin-bottom: 3px;
    }

    .skill-name {
      font-size: var(--font-size-normal);
      margin-bottom: 3px;
    }

    .skill-bar {
      display: flex;
      gap: 2px;
    }

    .skill-dot {
      width: 10px;
      height: 6px;
      border: 1px solid #999;
    }

    .skill-dot.filled {
      background-color: #999;
    }

    /* ========== 语言能力 ========== */
    .language-item {
      font-size: var(--font-size-normal);
      margin: 3px 0;
    }

    /* ========== 证书徽章 ========== */
    .cert-list {
      list-style: none;
      padding: 0;
      margin: 3px 0 0 0;
    }

    .cert-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      padding: 4px 6px;
      background: var(--bg-light);
      border-radius: 4px;
      border-left: 3px solid #e0e0e0;
    }

    .cert-icon {
      width: 28px;
      height: 28px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .cert-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cert-name {
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--bg-dark);
    }

    .cert-date {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
    }

    /* ========== Page 1: AWS Services ========== */
    .aws-services {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 3px;
    }

    .aws-service-tag {
      font-size: 7px;
      padding: 2px 5px;
      background: #ff9900;
      color: white;
      border-radius: 2px;
      font-weight: 600;
    }

    /* ========== Page 1: Featured Project ========== */
    .featured-project {
      padding: 8px 10px;
      background: var(--bg-light);
      border-radius: 4px;
      border-left: 3px solid #e0e0e0;
      margin-top: 4px;
    }

    .featured-project-name {
      font-size: var(--font-size-normal);
      font-weight: bold;
      margin-bottom: 4px;
    }

    .featured-project-desc {
      font-size: var(--font-size-small);
      line-height: 1.5;
      color: var(--primary-color);
      margin-bottom: 4px;
    }

    .featured-project-arch {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      line-height: 1.4;
    }

    .featured-project-purpose {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      margin-bottom: 4px;
      font-style: italic;
    }

    .featured-project-plan {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      margin-top: 3px;
    }

    .featured-project-note {
      font-size: 7px;
      color: var(--secondary-color);
      margin-top: 4px;
      font-style: italic;
    }

    .other-projects-list {

      color: var(--secondary-color);

    }

      line-height: 1.5;
      color: var(--primary-color);

      left: 0;
      color: var(--accent-color);
      font-size: 8px;
    }

      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .career-company-name {
      font-size: var(--font-size-title);
      font-weight: bold;
    }

    .career-company-period {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      background: white;
      padding: 1px 8px;
      border-radius: 10px;
    }

    .career-project-list {
      padding: 0;
      margin: 0;
    }

    .career-project-item {
      padding: 4px 0;
      font-size: var(--font-size-small);
      border-bottom: 1px dotted #e0e0e0;
    }

    .career-project-item:last-child {
      border-bottom: none;
    }

    .career-project-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .career-project-client {
      font-weight: bold;
      min-width: 120px;
      flex-shrink: 0;
    }

    .career-project-role {

      padding: 1px 6px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 3px;
      font-weight: 600;
      white-space: nowrap;
    }

    .career-project-period {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      margin-left: auto;
      white-space: nowrap;
    }

      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      padding-left: 4px;
      margin-top: 2px;
      line-height: 1.4;
    }

      gap: 6px;
      font-size: var(--font-size-small);

    .personal-project-name {

      color: var(--primary-color);

    .project-client {

      font-weight: bold;
      color: var(--primary-color);

      border-radius: 10px;

      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

      font-size: var(--font-size-tiny);
      padding: 2px 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 3px;
      font-weight: 600;
    }

    .team-size {
      font-size: var(--font-size-tiny);
      color: var(--secondary-color);
      border: 1px solid var(--border-color);
      padding: 1px 6px;
      border-radius: 3px;
    }

      font-size: 7px;
      padding: 1px 5px;
      background: #e8eaf6;
      color: #3949ab;
      border-radius: 2px;
      font-weight: 600;

    .project-section {
      margin-bottom: 5px;
    }

    .project-label {
      font-size: var(--font-size-tiny);
      font-weight: bold;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .project-content {
      font-size: var(--font-size-small);
      line-height: 1.5;
      color: var(--primary-color);
      padding-left: 8px;
    }

    /* 亮点列表 */
    .highlight-item {
      position: relative;
      padding-left: 10px;
      margin: 2px 0;
    }

    .highlight-item::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--accent-color);
      font-size: 8px;
    }

      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      padding-left: 8px;

      font-size: var(--font-size-tiny);
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--bg-dark);
      color: white;
    }

    }

    .tech-tag.fw {
      background: #6db33f;
    }

    .tech-tag.db {
      background: #336791;
    }

    .tech-tag.cloud {
      background: #ff9900;
    }

    /* ========== 打印优化 ========== */
    @media print {

        width: 210mm;
        margin: 0;
        padding: 0;
        background-color: white;

        height: 297mm;

      .resume-container:last-child {

      .resume-container + .resume-container {
        margin-top: 0;
      }

      .project-card,
      .cert-item,
      .edu-item,
      .personal-project {
        page-break-inside: avoid;
      }
    }
  </style>

  // ================================================================
  // 移动端等比缩放
  // ================================================================
  function applyMobileScaling() {
    const containers = document.querySelectorAll('.resume-container');
    // 210mm ≈ 794px (at 96dpi)
    const containerNaturalWidth = 794;
    const viewportWidth = window.innerWidth;

    if (viewportWidth < containerNaturalWidth) {
      const scale = viewportWidth / containerNaturalWidth;
      containers.forEach(container => {
        container.style.zoom = scale;
      });
      document.body.style.backgroundColor = 'white';
    } else {
      containers.forEach(container => {
        container.style.zoom = '';
      });
      document.body.style.backgroundColor = '';
    }
  }

  // ================================================================
  // 渲染
  // ================================================================
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("page1").innerHTML = renderPage1();
    document.getElementById("page2").innerHTML = renderPage2();
    document.getElementById("page3").innerHTML = renderPage3();
    new QRCode(document.getElementById("resume-qr"), {
      text: "https://nba-game.liuyang19900520.com/lineup",
      width: 64,
      height: 64,
      colorDark: "#333333",
      colorLight: "#ffffff",
    });

    // 初始化缩放
    applyMobileScaling();
  });

  // 窗口resize时重新计算
  window.addEventListener('resize', applyMobileScaling);

  // 打印时恢复原始尺寸
  window.addEventListener('beforeprint', () => {
    document.querySelectorAll('.resume-container').forEach(c => {
      c.style.zoom = '';
    });
  });
  window.addEventListener('afterprint', () => {
    applyMobileScaling();
  });
</script>
